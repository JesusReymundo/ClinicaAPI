<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Diagrama ER — ClinicaDB v2</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#1e1e2e; font-family:'Segoe UI',sans-serif; overflow:hidden; color:#fff; user-select:none; }
#toolbar {
  position:fixed; top:0; left:0; right:0; z-index:100;
  background:#13131f; border-bottom:1px solid #333;
  display:flex; align-items:center; gap:12px; padding:8px 16px; height:46px;
}
#toolbar h1 { font-size:14px; font-weight:700; color:#a78bfa; white-space:nowrap; }
#toolbar .badge { background:#7c3aed; color:#fff; border-radius:10px; padding:2px 8px; font-size:11px; }
#toolbar .sep { width:1px; height:24px; background:#333; }
.tbtn { background:#252535; border:1px solid #444; color:#ccc; border-radius:6px; padding:4px 10px; cursor:pointer; font-size:12px; }
.tbtn:hover { background:#333; color:#fff; }
#search { background:#252535; border:1px solid #444; color:#fff; border-radius:6px; padding:4px 10px; font-size:12px; width:160px; outline:none; }
#search::placeholder { color:#666; }
#viewport { position:fixed; top:46px; left:0; right:0; bottom:0; overflow:hidden; cursor:grab; }
#viewport.panning { cursor:grabbing; }
#canvas { position:relative; width:2200px; height:1700px; }
#svg-overlay { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:1; }
.dbt { position:absolute; width:215px; background:#fff; border-radius:4px; box-shadow:0 2px 12px rgba(0,0,0,0.5); z-index:10; cursor:move; border:2px solid transparent; }
.dbt:hover { box-shadow:0 4px 24px rgba(0,0,0,0.7); }
.dbt.highlighted { border-color:#f59e0b !important; box-shadow:0 0 0 3px rgba(245,158,11,0.4) !important; }
.dbt-hdr { padding:6px 10px; font-size:12px; font-weight:700; color:#fff; border-radius:2px 2px 0 0; display:flex; align-items:center; gap:6px; }
.dbt-cols { overflow:hidden; border-radius:0 0 2px 2px; }
.dbt-row { display:flex; align-items:center; padding:2px 8px; font-size:10.5px; border-bottom:1px solid #f0f0f0; background:#fff; min-height:21px; gap:4px; }
.dbt-row:last-child { border-bottom:none; }
.dbt-row.pk { background:#fff8e1; }
.dbt-row.fk { background:#e8f4fd; }
.dbt-row.pk.fk { background:#f3e5f5; }
.col-icon { width:14px; font-size:9px; flex-shrink:0; text-align:center; }
.col-name { flex:1; color:#1a1a2e; font-weight:500; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.col-name.pk-name { font-weight:700; }
.col-type { color:#888; font-size:9.5px; white-space:nowrap; }
.col-tag { font-size:8px; color:#fff; padding:0 3px; border-radius:2px; margin-left:2px; flex-shrink:0; }
.tag-pk { background:#f59e0b; } .tag-fk { background:#3b82f6; }
.tag-uq { background:#8b5cf6; } .tag-nn { background:#6b7280; }
#legend { position:fixed; bottom:16px; left:16px; z-index:100; background:#13131f; border:1px solid #333; border-radius:8px; padding:10px 14px; display:flex; flex-direction:column; gap:5px; }
#legend h4 { font-size:10px; color:#888; text-transform:uppercase; margin-bottom:2px; }
.leg-row { display:flex; align-items:center; gap:6px; font-size:10px; color:#ccc; }
.leg-dot { width:10px; height:10px; border-radius:2px; flex-shrink:0; }
</style>
</head>
<body>
<div id="toolbar">
  <h1>🗃️ Diagrama ER — ClinicaDB v2</h1>
  <span class="badge">26 tablas</span>
  <div class="sep"></div>
  <button class="tbtn" onclick="zoom(1.2)">+ Zoom</button>
  <button class="tbtn" onclick="zoom(0.8)">− Zoom</button>
  <button class="tbtn" onclick="resetView()">⟳ Reset</button>
  <button class="tbtn" onclick="fitAll()">⤢ Ajustar</button>
  <div class="sep"></div>
  <input id="search" type="text" placeholder="Buscar tabla..." oninput="searchTable(this.value)">
  <div class="sep"></div>
  <span style="font-size:11px;color:#888">🖱️ Drag para mover tablas &nbsp;|&nbsp; Scroll para zoom &nbsp;|&nbsp; Clic = resaltar relaciones</span>
</div>
<div id="viewport">
  <div id="canvas">
    <svg id="svg-overlay"></svg>
  </div>

<div id="legend">

  {from:'Cita',           fc:'IdTipoConsulta',   to:'TipoConsulta',  tc:'IdTipoConsulta'},
  {from:'CancelacionCita',fc:'IdCita',           to:'Cita',          tc:'IdCita'},
  {from:'Seguro',         fc:'IdPaciente',       to:'Paciente',      tc:'IdPaciente'},
  {from:'Comprobante',    fc:'IdCita',           to:'Cita',          tc:'IdCita'},
  {from:'Pago',           fc:'IdComprobante',    to:'Comprobante',   tc:'IdComprobante'},
  {from:'Pago',           fc:'IdMetodoPago',     to:'MetodoPago',    tc:'IdMetodoPago'},
  {from:'Triaje',         fc:'IdCita',           to:'Cita',          tc:'IdCita'},
  {from:'HistorialClinico',fc:'IdPaciente',      to:'Paciente',      tc:'IdPaciente'},
  {from:'HistorialClinico',fc:'IdCita',          to:'Cita',          tc:'IdCita'},
  {from:'Receta',         fc:'IdCita',           to:'Cita',          tc:'IdCita'},
  {from:'ItemReceta',     fc:'IdReceta',         to:'Receta',        tc:'IdReceta'},
  {from:'ItemReceta',     fc:'IdMedicamento',    to:'Medicamento',   tc:'IdMedicamento'},
];

function tableHeight(t){ return HDR + t.cols.length * ROW; }
function rowY(tbl, colName){
  const idx = tbl.cols.findIndex(c=>c.n===colName);
  return tbl.y + HDR + idx * ROW + ROW/2;
}

function buildTables(){
  const canvas = document.getElementById('canvas');
  Object.entries(TABLES).forEach(([name, tbl])=>{
    const div = document.createElement('div');
    div.className='dbt'; div.id='tbl-'+name;
    div.style.left=tbl.x+'px'; div.style.top=tbl.y+'px';
    const hdr=document.createElement('div');
    hdr.className='dbt-hdr'; hdr.style.background=tbl.color;
    hdr.innerHTML=`<span style="font-size:11px">▦</span><span>${name}</span>`;
    div.appendChild(hdr);
    const cols=document.createElement('div'); cols.className='dbt-cols';
    tbl.cols.forEach(col=>{
      const row=document.createElement('div');
      const cls=(col.pk&&col.fk)?'dbt-row pk fk':col.pk?'dbt-row pk':col.fk?'dbt-row fk':'dbt-row';
      row.className=cls; row.id=`col-${name}-${col.n}`;
      const icon=col.pk&&col.fk?'🔑🔗':col.pk?'🔑':col.fk?'🔗':'';
      const tags=[col.pk?'<span class="col-tag tag-pk">PK</span>':'',col.fk?'<span class="col-tag tag-fk">FK</span>':'',col.uq?'<span class="col-tag tag-uq">UQ</span>':'',col.nn&&!col.pk?'<span class="col-tag tag-nn">NN</span>':''].join('');
      row.innerHTML=`<span class="col-icon">${icon}</span><span class="col-name ${col.pk?'pk-name':''}" title="${col.n}">${col.n}</span><span class="col-type">${col.t}</span>${tags}`;
      cols.appendChild(row);
    });
    div.appendChild(cols);
    makeDraggable(div,name,tbl);
    canvas.appendChild(div);
  });
}

function drawLines(){
  const svg=document.getElementById('svg-overlay');
  svg.innerHTML=`<defs><marker id="ae" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#888"/></marker></defs>`;
  RELS.forEach(rel=>{
    const ft=TABLES[rel.from], tt=TABLES[rel.to];
    if(!ft||!tt) return;
    const fd=document.getElementById('tbl-'+rel.from), td=document.getElementById('tbl-'+rel.to);
    if(!fd||!td) return;
    const fx=parseInt(fd.style.left), fy2=parseInt(fd.style.top);
    const tx2=parseInt(td.style.left), ty2=parseInt(td.style.top);
    const fyd=rowY({...ft,x:fx,y:fy2},rel.fc);
    const tyd=rowY({...tt,x:tx2,y:ty2},rel.tc);
    const fcx=fx+W/2, tcx=tx2+W/2;
    let x1,x2,cx1,cx2;
    if(fcx<=tcx){x1=fx+W;x2=tx2;const g=Math.max(40,Math.abs(x2-x1)*0.4);cx1=x1+g;cx2=x2-g;}
    else{x1=fx;x2=tx2+W;const g=Math.max(40,Math.abs(x1-x2)*0.4);cx1=x1-g;cx2=x2+g;}
    const p=document.createElementNS('http://www.w3.org/2000/svg','path');
    p.setAttribute('d',`M${x1},${fyd} C${cx1},${fyd} ${cx2},${tyd} ${x2},${tyd}`);
    p.setAttribute('stroke',ft.color); p.setAttribute('stroke-width','1.5');
    p.setAttribute('fill','none'); p.setAttribute('opacity','0.65');
    p.setAttribute('marker-end','url(#ae)');
    const ti=document.createElementNS('http://www.w3.org/2000/svg','title');
    ti.textContent=`${rel.from}.${rel.fc} → ${rel.to}.${rel.tc}`; p.appendChild(ti);
    const t1=document.createElementNS('http://www.w3.org/2000/svg','text');
    t1.setAttribute('x',x2+(fcx<=tcx?-14:8)); t1.setAttribute('y',tyd-3);
    t1.setAttribute('fill',ft.color); t1.setAttribute('font-size','10'); t1.setAttribute('font-weight','700'); t1.textContent='1';
    const tN=document.createElementNS('http://www.w3.org/2000/svg','text');
    tN.setAttribute('x',x1+(fcx<=tcx?4:-12)); tN.setAttribute('y',fyd-3);
    tN.setAttribute('fill',ft.color); tN.setAttribute('font-size','10'); tN.setAttribute('font-weight','700'); tN.textContent='N';
    svg.appendChild(p); svg.appendChild(t1); svg.appendChild(tN);
  });
}

function makeDraggable(el,name,tblData){
  let sx,sy,sl,st;
  el.addEventListener('mousedown',e=>{
    if(e.ctrlKey) return; e.stopPropagation();
    sx=e.clientX; sy=e.clientY; sl=parseInt(el.style.left)||tblData.x; st=parseInt(el.style.top)||tblData.y;
    const onMove=e=>{const sc=currentScale; el.style.left=(sl+(e.clientX-sx)/sc)+'px'; el.style.top=(st+(e.clientY-sy)/sc)+'px'; TABLES[name].x=parseInt(el.style.left); TABLES[name].y=parseInt(el.style.top); drawLines();};
    const onUp=()=>{document.removeEventListener('mousemove',onMove); document.removeEventListener('mouseup',onUp);};
    document.addEventListener('mousemove',onMove); document.addEventListener('mouseup',onUp);
  });
  el.addEventListener('click',()=>highlightTable(name));
}

const vp=document.getElementById('viewport');
let tx=0,ty=0,currentScale=0.65;
function applyTransform(){document.getElementById('canvas').style.transform=`translate(${tx}px,${ty}px) scale(${currentScale})`; document.getElementById('canvas').style.transformOrigin='0 0';}
vp.addEventListener('mousedown',e=>{
  if(!e.ctrlKey&&e.target!==vp&&e.target.id!=='canvas'&&e.target.id!=='svg-overlay') return;
  const ps={x:e.clientX-tx,y:e.clientY-ty};
  const m=e2=>{tx=e2.clientX-ps.x; ty=e2.clientY-ps.y; applyTransform();};
  const u=()=>{document.removeEventListener('mousemove',m); document.removeEventListener('mouseup',u);};
  document.addEventListener('mousemove',m); document.addEventListener('mouseup',u);
});
vp.addEventListener('wheel',e=>{
  e.preventDefault();
  const d=e.deltaY>0?0.9:1.1, r=vp.getBoundingClientRect();
  tx=e.clientX-r.left-(e.clientX-r.left-tx)*d; ty=e.clientY-r.top-(e.clientY-r.top-ty)*d;
  currentScale=Math.min(Math.max(currentScale*d,0.2),3); applyTransform();
},{passive:false});
function zoom(f){currentScale=Math.min(Math.max(currentScale*f,0.2),3); applyTransform();}
function resetView(){tx=0;ty=0;currentScale=0.65;applyTransform();}
function fitAll(){
  let mnX=Infinity,mnY=Infinity,mxX=-Infinity,mxY=-Infinity;
  Object.values(TABLES).forEach(t=>{mnX=Math.min(mnX,t.x);mnY=Math.min(mnY,t.y);mxX=Math.max(mxX,t.x+W);mxY=Math.max(mxY,t.y+tableHeight(t));});
  const sc=Math.min((vp.clientWidth-40)/(mxX-mnX),(vp.clientHeight-40)/(mxY-mnY),1);
  currentScale=sc; tx=20-mnX*sc; ty=20-mnY*sc; applyTransform();
}

let lastHL=null;
function highlightTable(name){
  if(lastHL===name){document.querySelectorAll('.dbt').forEach(d=>d.classList.remove('highlighted'));lastHL=null;drawLines();return;}
  lastHL=name;
  document.querySelectorAll('.dbt').forEach(d=>d.classList.remove('highlighted'));
  const related=new Set([name]);
  RELS.forEach(r=>{if(r.from===name)related.add(r.to);if(r.to===name)related.add(r.from);});
  related.forEach(n=>document.getElementById('tbl-'+n)?.classList.add('highlighted'));
  const svg=document.getElementById('svg-overlay');
  svg.innerHTML=`<defs><marker id="ae" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#888"/></marker></defs>`;
  RELS.forEach(rel=>{
    const active=rel.from===name||rel.to===name;
    const ft=TABLES[rel.from],tt=TABLES[rel.to];
    if(!ft||!tt) return;
    const fd=document.getElementById('tbl-'+rel.from),td=document.getElementById('tbl-'+rel.to);
    if(!fd||!td) return;
    const fx=parseInt(fd.style.left),fy2=parseInt(fd.style.top),tx2=parseInt(td.style.left),ty2=parseInt(td.style.top);
    const fyd=rowY({...ft,x:fx,y:fy2},rel.fc),tyd=rowY({...tt,x:tx2,y:ty2},rel.tc);
    const fcx=fx+W/2,tcx=tx2+W/2;
    let x1,x2,cx1,cx2;
    if(fcx<=tcx){x1=fx+W;x2=tx2;const g=Math.max(40,Math.abs(x2-x1)*0.4);cx1=x1+g;cx2=x2-g;}
    else{x1=fx;x2=tx2+W;const g=Math.max(40,Math.abs(x1-x2)*0.4);cx1=x1-g;cx2=x2+g;}
    const color=active?ft.color:'#444',op=active?'0.9':'0.15',sw=active?'2':'1';
    const p=document.createElementNS('http://www.w3.org/2000/svg','path');
    p.setAttribute('d',`M${x1},${fyd} C${cx1},${fyd} ${cx2},${tyd} ${x2},${tyd}`);
    p.setAttribute('stroke',color); p.setAttribute('stroke-width',sw); p.setAttribute('fill','none'); p.setAttribute('opacity',op);
    if(active) p.setAttribute('marker-end','url(#ae)');
    svg.appendChild(p);
    if(active){
      [['1',x2+(fcx<=tcx?-14:8),tyd],['N',x1+(fcx<=tcx?4:-12),fyd]].forEach(([lbl,lx,ly])=>{
        const t=document.createElementNS('http://www.w3.org/2000/svg','text');
        t.setAttribute('x',lx); t.setAttribute('y',ly-3); t.setAttribute('fill',color);
        t.setAttribute('font-size','11'); t.setAttribute('font-weight','700'); t.textContent=lbl; svg.appendChild(t);
      });
    }
  });
}

function searchTable(val){
  const q=val.trim().toLowerCase();
  document.querySelectorAll('.dbt').forEach(d=>d.style.outline='');
  if(!q) return;
  Object.keys(TABLES).forEach(name=>{
    const el=document.getElementById('tbl-'+name);
    if(!el) return;
    if(name.toLowerCase().includes(q)){
      el.style.outline='3px solid #f59e0b';
      tx=vp.clientWidth/2-TABLES[name].x*currentScale-W*currentScale/2;
      ty=vp.clientHeight/2-TABLES[name].y*currentScale-80*currentScale;
      applyTransform();
    }
  });
}

buildTables(); drawLines(); applyTransform();
</script>
</body>
</html>
